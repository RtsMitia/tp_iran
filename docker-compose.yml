version: '3.8'
services:
  php-apache:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    networks:
      - app-network

  db:
    image: mysql:8.0
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql # This runs the script automatically on startup
    environment:
      MYSQL_DATABASE: tp_iran
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge